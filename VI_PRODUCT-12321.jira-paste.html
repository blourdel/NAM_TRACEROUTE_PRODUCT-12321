<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function () {
  const b64 = document.getElementById('md-payload').textContent.trim();
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const md = new TextDecoder('utf-8').decode(bytes);
  marked.use({ gfm: true, breaks: false });
  document.getElementById('content').innerHTML = marked.parse(md);
})();

function copyContent() {
  const el = document.getElementById('content');
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try {
    document.execCommand('copy');
    document.getElementById('status').textContent = 'Copied as rich text — paste into Jira now.';
  } catch (e) {
    document.getElementById('status').textContent = 'Copy failed: select manually and Ctrl+C.';
  }
}
</script>
