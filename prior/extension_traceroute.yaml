            defaultColumn: false
            resizable: true
            sortable: true
        perspectives:
          - name: device
            columns:
              - field: device
      - key: same_host_entities_dql
        displayName: Hosts
        description: Monitored Hosts that match the Ip address of this device trace
        query:
          query: >
            fetch `dt.entity.host`
            | filter same_as[`dt.entity.dynatrace:traceroute_device`]==$(entityId)
            | fieldsAdd device = record(entityId=id, displayName=entity.name, dim="dt.entity.dynatrace:traceroute_device")
          lookups: []
        columns:
          - field: device
            displayName: Name
            columnType: TEXT
