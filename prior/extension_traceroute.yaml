python:
  runtime:
    module: traceroute
    version:
      min: "3.10"
  featureSets:
    - featureSet: default
      metrics:
        - key: traceroute.rtt
        - key: traceroute.connection
        # - key: traceroute.loss_percent
  activation:
    remote:
      path: activationSchema.json
    local:
      path: activationSchema.json

keywords:
  - title:traceroute
  - category:network
  - tech:connectivity
  - vendor:other
  - icon:extensions
  - entity:None
