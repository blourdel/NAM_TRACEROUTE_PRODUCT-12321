      - key: same_network_interface_dql
        displayName: Network Interfaces
        description: Monitored Network interfaces that match the Ip address of this device trace
        query:
          query: >
            fetch `dt.entity.network:interface`
            | filter same_as[`dt.entity.dynatrace:traceroute_device`]==$(entityId)
            | fieldsAdd device = record(entityId=id, displayName=entity.name, dim="dt.entity.dynatrace:traceroute_device")
          lookups: []
        columns:
          - field: device
            displayName: Name
            columnType: TEXT
